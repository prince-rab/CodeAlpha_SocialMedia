<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SocialSphere</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="js/api.js"></script>
</head>
<body class="auth-page">

  <div class="auth-container">
    <!-- Left Panel -->
    <div class="auth-left">
      <div class="auth-brand">
        <div class="brand-logo large">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="20" fill="url(#grad3)"/>
            <path d="M10 20 Q20 8 30 20 Q20 32 10 20Z" fill="white" opacity="0.9"/>
            <defs>
              <linearGradient id="grad3" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#667eea"/>
                <stop offset="100%" stop-color="#764ba2"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name large">SocialSphere</span>
      </div>
      <h2 class="auth-tagline">Join the community!</h2>
      <p class="auth-desc">Create your free account and start connecting with amazing people, sharing your stories, and growing your network.</p>
      <div class="auth-illustration">
        <div class="ill-circle c1"></div>
        <div class="ill-circle c2"></div>
        <div class="ill-circle c3"></div>
      </div>
    </div>

    <!-- Right Panel (Form) -->
    <div class="auth-right">
      <div class="auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Already have an account? <a href="login.html">Sign in</a></p>

        <!-- Alert -->
        <div id="authAlert" class="alert hidden"></div>

        <form id="registerForm" novalidate>
          <div class="form-group">
            <label for="name" class="form-label">Full Name</label>
            <div class="input-wrapper">
              <span class="input-icon">👤</span>
              <input
                type="text"
                id="name"
                name="name"
                class="form-input"
                placeholder="Your full name"
                autocomplete="name"
                required
              />
            </div>
            <span class="field-error" id="nameError"></span>
          </div>

          <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <div class="input-wrapper">
              <span class="input-icon">@</span>
              <input
                type="text"
                id="username"
                name="username"
                class="form-input"
                placeholder="your_username"
                autocomplete="username"
                required
              />
            </div>
            <span class="field-error" id="usernameError"></span>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
            </div>
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="At least 6 characters"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-password" onclick="togglePassword('password')">👁</button>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                class="form-input"
                placeholder="Repeat your password"
                autocomplete="new-password"
                required
              />
              <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">👁</button>
            </div>
            <span class="field-error" id="confirmPasswordError"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
            <span class="btn-text">Create Account</span>
            <span class="btn-spinner hidden"></span>
          </button>
        </form>

        <div class="auth-divider"><span>or</span></div>
        <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
