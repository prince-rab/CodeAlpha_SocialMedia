<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Post — SocialSphere</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/feed.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="js/api.js"></script>
</head>
<body class="app-page">

  <!-- Top Navigation Bar -->
  <header class="app-header">
    <div class="header-inner">
      <a href="feed.html" class="nav-brand">
        <div class="brand-logo small">
          <svg width="24" height="24" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="14" r="14" fill="url(#cpgrad)"/>
            <path d="M8 14 Q14 6 20 14 Q14 22 8 14Z" fill="white" opacity="0.9"/>
            <defs>
              <linearGradient id="cpgrad" x1="0" y1="0" x2="28" y2="28">
                <stop offset="0%" stop-color="#667eea"/>
                <stop offset="100%" stop-color="#764ba2"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="brand-name">SocialSphere</span>
      </a>

      <div class="header-search">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search people..." />
        <div id="searchResults" class="search-dropdown hidden"></div>
      </div>

      <div class="header-actions">
        <a href="feed.html" class="nav-icon-btn" title="Feed">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22"/>
          </svg>
        </a>
        <a href="create-post.html" class="nav-icon-btn active" title="Create Post">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </a>
        <a href="profile.html" class="nav-icon-btn" title="Profile" id="profileNavBtn">
          <div class="nav-avatar" id="navAvatar"></div>
        </a>
        <button class="nav-icon-btn logout-btn" title="Logout" id="logoutBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16,17 21,12 16,7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav">
    <a href="feed.html" class="mobile-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      <span>Feed</span>
    </a>
    <a href="create-post.html" class="mobile-nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>Post</span>
    </a>
    <a href="profile.html" class="mobile-nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </a>
  </nav>

  <!-- Main Content -->
  <main class="create-post-layout">
    <div class="create-post-container">
      <div class="page-header">
        <a href="feed.html" class="back-btn">← Back to Feed</a>
        <h1 class="page-title">Create Post</h1>
      </div>

      <div id="createAlert" class="alert hidden"></div>

      <div class="create-post-card-full">
        <div class="post-author-row">
          <div class="post-author-avatar" id="postAuthorAvatar"></div>
          <div>
            <div class="post-author-name" id="postAuthorName">Loading...</div>
            <div class="post-author-handle" id="postAuthorHandle">@username</div>
          </div>
        </div>

        <form id="createPostForm">
          <div class="form-group">
            <textarea
              id="postContent"
              class="post-textarea"
              placeholder="What's on your mind? Share your thoughts, ideas, or a moment..."
              rows="6"
              maxlength="2000"
            ></textarea>
            <div class="textarea-footer">
              <span class="char-count"><span id="postCharCount">0</span>/2000</span>
            </div>
          </div>

          <!-- Image upload preview -->
          <div class="image-upload-area" id="imageUploadArea">
            <input type="file" id="postImage" accept="image/*" class="hidden-input" />
            <label for="postImage" class="image-upload-label">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21,15 16,10 5,21"/>
              </svg>
              <span>Add Photo</span>
            </label>
          </div>

          <!-- Image preview -->
          <div id="imagePreviewContainer" class="image-preview-container hidden">
            <img id="imagePreview" src="" alt="Preview" class="image-preview" />
            <button type="button" class="remove-image-btn" id="removeImageBtn">✕ Remove</button>
          </div>

          <div class="post-submit-row">
            <div class="post-options">
              <label for="postImage" class="option-btn" title="Add Photo">
                📷 Photo
              </label>
            </div>
            <button type="submit" class="btn btn-primary" id="submitPostBtn">
              <span class="btn-text">Share Post</span>
              <span class="btn-spinner hidden"></span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="js/post.js"></script>
</body>
</html>
